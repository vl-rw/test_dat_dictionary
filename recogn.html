<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Простое распознавание речи</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
      color: white;
    }
    button {
      font-size: 1.1em;
      padding: 14px 32px;
      margin: 12px;
      cursor: pointer;
    }
    #result {
      margin-top: 30px;
      min-height: 120px;
      padding: 20px;
      background: #1c1c1c;
      border: 1px solid #e65535;
      border-radius: 8px;
      white-space: pre-wrap;
      text-align: left;
      font-size: 1.1em;
    }
    .info {
      color: #1f1f1f;
      font-size: 0.9em;
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <h1>Распознавание речи</h1>
  
  <button id="start">▶ Начать слушать</button>
  <button id="stop" disabled>■ Стоп</button>
  
  <div id="result">Здесь появится текст…</div>
  
  <div class="info">
    Работает в Chrome / Edge.<br>
    Нужно разрешение на микрофон.<br>
    Требуется интернет (аудио отправляется на сервера).
  </div>

  <script>
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    
    if (!recognition) {
      document.body.innerHTML += '<p style="color:red">Ваш браузер не поддерживает распознавание речи :(</p>';
    } else {
      recognition.lang = 'ru-RU';           // русский язык (можно 'en-US', 'de-DE' и т.д.)
      recognition.interimResults = true;    // показывать промежуточные результаты
      recognition.maxAlternatives = 1;      // сколько вариантов предлагать (обычно 1 хватает)
      // recognition.continuous = true;     // можно раскомментировать — будет слушать без остановки

      const startBtn = document.getElementById('start');
      const stopBtn  = document.getElementById('stop');
      const result   = document.getElementById('result');

      startBtn.onclick = () => {
        recognition.start();
        startBtn.disabled = true;
        stopBtn.disabled  = false;
        result.textContent = "Слушаю... Говорите!";
      };

      stopBtn.onclick = () => {
        recognition.stop();
      };

      recognition.onresult = (event) => {
        let interim = '';
        let final   = '';

        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            final += event.results[i][0].transcript;
          } else {
            interim += event.results[i][0].transcript;
          }
        }

        result.textContent = final + (interim ? `\n(пока думаю: ${interim})` : '');
      };

      recognition.onend = () => {
        startBtn.disabled = false;
        stopBtn.disabled  = true;
        if (result.textContent.includes('Слушаю')) {
          result.textContent = 'Закончил слушать.';
        }
      };

      recognition.onerror = (event) => {
        result.textContent = `Ошибка: ${event.error}\n(часто — нет интернета или нет разрешения на микрофон)`;
        startBtn.disabled = false;
        stopBtn.disabled  = true;
      };
    }
  </script>

</body>
</html>
