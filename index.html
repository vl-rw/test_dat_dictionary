<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Автоматическое распознавание речи и озвучка текста</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
    }
    button {
      font-size: 1.1em;
      padding: 14px 32px;
      margin: 12px;
      cursor: pointer;
    }
    #result {
      margin-top: 30px;
      min-height: 120px;
      padding: 20px;
      background: #f0f8ff;
      border: 1px solid #a0d0ff;
      border-radius: 8px;
      white-space: pre-wrap;
      text-align: left;
      font-size: 1.1em;
    }
    .info {
      color: #555;
      font-size: 0.9em;
      margin-top: 30px;
    }
  </style>
</head>
<body>

<h1>Автоматическое распознавание речи и озвучка текста</h1>

<div id="buttons-container">
  <button id="start">▶ Начать слушать</button>
  <button id="stop" disabled>■ Стоп</button>
</div>

<div id="result">Здесь появится распознанный текст…</div>

<div class="info">
  Работает в Chrome / Edge.<br>
  Нужно разрешение на микрофон.<br>
  Требуется интернет (аудио отправляется на сервера).<br><br>
  После распознавания произнесённого текста будет воспроизведён ответ.
</div>

<script>
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
if (!recognition) {
  document.body.innerHTML += '<p style="color:red">Ваш браузер не поддерживает распознавание речи :(</p>';
} else {
  recognition.lang = 'ru-RU';               // русский язык
  recognition.interimResults = true;       // показывать промежуточные результаты
  recognition.maxAlternatives = 1;         // количество альтернативных результатов
  // recognition.continuous = true;        // непрерывное прослушивание

  const startBtn = document.getElementById('start');
  const stopBtn  = document.getElementById('stop');
  const result   = document.getElementById('result');

  startBtn.onclick = () => {
    recognition.start();
    startBtn.disabled = true;
    stopBtn.disabled  = false;
    result.textContent = "Слушаю... Говорите!";
  };

  stopBtn.onclick = () => {
    recognition.stop();
  };

  recognition.onresult = (event) => {
    let interim = '';
    let final   = '';

    for (let i = event.resultIndex; i < event.results.length; ++i) {
      if (event.results[i].isFinal) {
        final += event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }

    result.textContent = final + (interim ? `\n(пока думаю: ${interim})` : '');

    // Произносим стандартную фразу после каждого распознавания
    if (final && !interim) {
      speakPhrase("Твой запрос получем и распознан. Жаль, у меня нет мозгов, чтобы ответить. Попробуй ещё раз!");
    }
  };

  function speakPhrase(text) {
    const synth = window.speechSynthesis;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ru-RU';
    utterance.volume = 1.0;
    utterance.rate = 1.0;
    utterance.pitch = 1.0;

    synth.speak(utterance);

    // Добавляем обработчик события окончания озвучки
    utterance.onend = () => {
      console.log("Фраза успешно произнесена");
      
      // Начинаем новое распознавание после успешной озвучки
      recognition.start();
    };
  }

  recognition.onend = () => {
    startBtn.disabled = false;
    stopBtn.disabled  = true;
    if (result.textContent.includes('Слушаю')) {
      result.textContent = 'Закончил слушать.';
    }
  };

  recognition.onerror = (event) => {
    result.textContent = `Ошибка: ${event.error}\n(часто — нет интернета или нет разрешения на микрофон)`;
    startBtn.disabled = false;
    stopBtn.disabled  = true;
  };
}
</script>

</body>
</html>
